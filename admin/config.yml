backend:
  name: git-gateway
  branch: master

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "portfolio"
    label: "Portfolio projecten"
    folder: "portfolio"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Paginatitel (SEO)", name: "pageTitle", widget: "string", hint: "bijv. afbouwr.nl — Calculator | BYGGR" }
      - { label: "Meta omschrijving", name: "metaDescription", widget: "string" }
      - { label: "Canonical URL", name: "canonical", widget: "string", hint: "bijv. https://byggr.nl/portfolio/afbouwr.html" }
      - { label: "OG Afbeelding URL", name: "ogImage", widget: "string", required: false }
      - { label: "Projectnaam (H1)", name: "title", widget: "string" }
      - { label: "Label", name: "label", widget: "string", hint: "bijv. Website · In uitvoering" }
      - { label: "Intro tekst", name: "intro", widget: "text" }
      - { label: "Afbeelding URL", name: "image", widget: "string" }
      - { label: "Afbeelding alt-tekst", name: "imageAlt", widget: "string" }
      - label: "Blokken"
        name: "blocks"
        widget: "list"
        fields:
          - { label: "Kicker", name: "kicker", widget: "string", hint: "bijv. 01 — Uitdaging" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Tekst (paragraaf)", name: "body", widget: "text", required: false }
      - { label: "CTA titel", name: "ctaTitle", widget: "string", default: "Soortgelijk project nodig?" }
      - { label: "CTA knoptekst", name: "ctaButton", widget: "string", default: "Neem contact op" }

  - name: "services"
    label: "Services"
    folder: "services"
    create: false
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Paginatitel (SEO)", name: "pageTitle", widget: "string" }
      - { label: "Meta omschrijving", name: "metaDescription", widget: "string" }
      - { label: "Canonical URL", name: "canonical", widget: "string" }
      - { label: "OG Afbeelding URL", name: "ogImage", widget: "string", required: false }
      - { label: "Servicenaam (H1)", name: "title", widget: "string" }
      - { label: "Label", name: "label", widget: "string", hint: "bijv. 01 — Websites" }
      - { label: "Intro tekst", name: "intro", widget: "text" }
      - { label: "Afbeelding URL", name: "image", widget: "string" }
      - { label: "Afbeelding alt-tekst", name: "imageAlt", widget: "string" }
      - { label: "CTA titel", name: "ctaTitle", widget: "string" }
      - { label: "CTA knoptekst", name: "ctaButton", widget: "string" }
